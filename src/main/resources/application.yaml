server:
  forward-headers-strategy: native

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: nat1_website_api
  datasource:
    url: jdbc:postgresql://localhost:5432/nat_website
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost

app:
  cors:
    allowed-origins: https://admin.agungdh.my.id
  auth:
    expiration-ms: 86400000
    cookie:
      secure: true
      same-site: Strict
  site:
    base-url: http://localhost:4321
    post-path: /blog
  scheduler:
    interval-ms: 120000
  ai:
    base-url:
    api-key:
    model:
